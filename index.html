<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Basta - Juego alfabético</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <div class="container">
        <header>
            <h1>Basta / Alfabeto - Super</h1>
            <div class="controls">
                <button id="startBtn" class="btn">Iniciar</button>
                <button id="nextBtn" class="btn" title="Siguiente pregunta">➡️</button>
                <button id="exitBtn" class="btn danger" title="Salir del juego">Salir</button>
            </div>
        </header>

        <main>
            <section class="question-section">
                <div id="questionCard" class="question-card">
                    <div id="questionText" class="question-text">Pulsa Iniciar para mostrar la primera categoría</div>
                    <div id="countdown" class="countdown hidden">3</div>
                </div>
            </section>

            <section class="timer-section">
                <div class="timer-info">
                    <div class="timer-label">Tiempo restante</div>
                    <div id="timeLeft">15</div><span>s</span>
                </div>
                <div class="timer-bar-wrap">
                    <div id="timerBar" class="timer-bar"></div>
                </div>
            </section>

            <section class="alphabet-section">
                <div id="alphabetContainer" class="alphabet-container">
                    <!-- Letras se generan por JS -->
                </div>
            </section>

            <section class="status-section">
                <div id="statusMessage" class="status-message"></div>
            </section>
        </main>

        <footer>
            <small>Juego creado por Jordan — pulsa letras para marcar respuestas. 15s por letra</small>
        </footer>
    </div>

    <!-- Audios (coloca tus archivos en /assets/audio/) -->
    <audio id="audio-start" src="assets/audio/start_alarm.mp3" preload="auto"></audio>
    <audio id="audio-beep" src="assets/audio/countdown_beep.mp3" preload="auto"></audio>
    <audio id="audio-error" src="assets/audio/error_sound.mp3" preload="auto"></audio>
    <audio id="audio-key" src="assets/audio/keypress_sound.mp3" preload="auto"></audio>
    <audio id="audio-success" src="assets/audio/success_sound.mp3" preload="auto"></audio>

    <script src="js/app.js"></script>
</body>

</html>
